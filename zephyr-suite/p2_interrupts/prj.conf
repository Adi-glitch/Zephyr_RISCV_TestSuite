# Phase 2: interrupts. The S-mode kernel takes its timer IRQs via the in-tree
# M-mode SBI runtime (mirroring the suite's m_trap.c SBI). IRQ_OFFLOAD gives an
# idiomatic way to run code in IRQ context (the suite's self-IPI equivalent).
CONFIG_ZTEST=y
CONFIG_IRQ_OFFLOAD=y
# P2.4 (timer x page-fault) drives the MMU fix-retry hook + map_raw/pte_lookup.
CONFIG_RISCV_MMU=y
