# Boot straight into the bare-metal suite (bypass the Zephyr kernel).
CONFIG_BAREMETAL_SUITE=y

# Dual-core: instantiate a 2nd hart in QEMU (-> -smp cpus=2). reset.S diverts
# hart 1 into the suite's core1_smode_park_loop().
CONFIG_MP_MAX_NUM_CPUS=2

# QEMU's -icount is incompatible with -smp >1; turn it off for this phase only.
CONFIG_QEMU_ICOUNT=n
